  <!-- Base Style -->
  <style>
    :root{
      --bg:#0b0b0d;
      --gold:#d4b08c;
      --soft:#cfcfcf;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Georgia, serif;
      background:var(--bg);
      color:#eee;
      line-height:1.85;
      text-align:center;
      padding:80px 20px 60px;
    }

    h1{
      color:var(--gold);
      font-size:38px;
      margin-bottom:22px;
      font-weight:600;
      letter-spacing:0.4px;
    }

    p{
      max-width:760px;
      margin:0 auto 22px;
      font-size:18px;
      color:#ccc;
    }

    .claim{
      font-style:italic;
      color:rgba(255,255,255,0.7);
      margin-bottom:40px;
    }

    /* CTA */
    .button{
      display:inline-block;
      margin:20px auto 0;
      padding:14px 34px;
      border-radius:999px;
      border:1px solid rgba(212,176,140,0.65);
      color:var(--gold);
      text-decoration:none;
      font-size:16px;
      font-weight:600;
      transition:0.25s ease;
      background:rgba(255,255,255,0.03);
    }

    .button:hover{
      background:var(--gold);
      color:#000;
      transform:translateY(-2px);
    }

    .button:focus-visible{
      outline:2px solid #fff;
      outline-offset:4px;
    }

    /* Flags */
    .flags{
      margin-top:60px;
    }

    .flags a{
      margin:0 10px;
      position:relative;
      display:inline-block;
    }

    .flags img{
      width:28px;
      height:28px;
      border-radius:50%;
      opacity:.85;
      transition:.2s ease;
    }

    .flags img:hover{
      opacity:1;
      transform:translateY(-2px);
    }

    .flags a.active img{
      opacity:1;
      outline:2px solid var(--gold);
      outline-offset:4px;
    }

    .flags a::after{
      content:attr(aria-label);
      position:absolute;
      bottom:-36px;
      left:50%;
      transform:translateX(-50%);
      background:#151515;
      color:var(--gold);
      font-size:12px;
      padding:4px 10px;
      border-radius:8px;
      opacity:0;
      white-space:nowrap;
      transition:.2s;
      pointer-events:none;
    }

    .flags a:hover::after,
    .flags a:focus-visible::after{
      opacity:1;
    }

    footer{
      margin-top:90px;
      font-size:14px;
      color:#777;
    }

    footer a{
      color:var(--gold);
      text-decoration:none;
    }

    footer a:hover{
      text-decoration:underline;
    }
  </style>
