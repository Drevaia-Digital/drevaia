<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#0b0b0d;
  color:#eee;
  line-height:1.85;
  text-align:center;
  padding:70px 20px;
}

h1{
  color:#d4b08c;
  font-size:36px;
  margin-bottom:22px;
  font-weight:600;
  letter-spacing:0.3px;
}

p{
  max-width:760px;
  margin:0 auto 22px;
  font-size:18px;
  color:#ccc;
}

em{
  color:#d6d6d6;
}

.cta-group{
  margin-top:40px;
}

.cta-transition{
  margin:32px 0 18px;
  font-size:15px;
  opacity:0.65;
}

a.button{
  display:inline-block;
  padding:14px 32px;
  border:1px solid rgba(212,176,140,0.7);
  color:#d4b08c;
  text-decoration:none;
  border-radius:999px;
  font-size:16px;
  font-weight:600;
  transition:0.25s ease;
  background:rgba(255,255,255,0.03);
}

a.button:hover{
  background:#d4b08c;
  color:#000;
  transform:translateY(-2px);
}

a.button:focus-visible{
  outline:2px solid #fff;
  outline-offset:4px;
}

/* FLAGS */
.flags{
  margin-top:55px;
}

.flags a{
  margin:0 9px;
  position:relative;
  display:inline-block;
}

.flags img{
  width:26px;
  height:26px;
  border-radius:50%;
  opacity:0.85;
  transition:0.2s ease;
}

.flags img:hover{
  opacity:1;
  transform:translateY(-2px);
}

.flags a.active img{
  opacity:1;
  outline:2px solid #d4b08c;
  outline-offset:3px;
}

footer{
  margin-top:80px;
  font-size:14px;
  color:#777;
}

footer a{
  color:#aaa;
  text-decoration:none;
}

footer a:hover{
  text-decoration:underline;
}
</style>

<body>

<h1>Bem-vindo à Drevaia Digital</h1>

<p>

Um espaço tranquilo para sentir, curar e voltar a si.
</p>

<p><em>Escolha o que te sustenta hoje.</em></p>

<!-- CTA GROUP -->
<div class="cta-group">

  <!-- Biblioteca -->
  <a class="button"
     href="https://payhip.com/DrevaiaDigital/collection/portuguese-library"

  </a>

    Ou comece com a leitura do dia.
  </p>

     href="/pt/library/viver-no-automatico">
     Abrir leitura do dia
  </a>

</div>

<!-- FLAGS -->
<div class="flags">
  <a href="/"><img src="/flags/es.webp" alt="Español"></a>
  <a href="/en/"><img src="/flags/en.webp" alt="English"></a>
  <a href="/fr/"><img src="/flags/fr.webp" alt="Français"></a>
  <a href="/pt/" class="active"><img src="/flags/pt.webp" alt="Português"></a>

<footer>
  <p>
    <a href="/legal/legal-pt.html">
      Legal — Privacidade e Reembolsos
    </a>
  </p>
</footer>

<audio id="bg-music" preload="metadata">
  <source src="/campanas.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function initAudio(){
  const audio=document.getElementById("bg-music");
  if(audio && audio.paused){
    audio.volume=0.15;
    audio.play().catch(()=>{});
  }
  document.removeEventListener("click", initAudio);
});
</script>

<script src="/partials/include.js" defer></script>
