<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca Drevaia — Leituras que te encontram</title>

  <meta name="description" content="Biblioteca emocional Drevaia. Escolha pelo que sente hoje.">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://drevaia.com/pt/library/">

  <!-- ✅ Ruta corregida -->
  <link rel="stylesheet" href="../../css/drevaia.css">
</head>

<body class="dark">

<header class="hero small">
  <h1>Biblioteca Drevaia</h1>

  <p class="brand-claim">
    A palavra que abre portais de cura.
  </p>

  <p>
    Não é uma loja.<br>
    É um refúgio emocional.<br>
    Escolha pelo que hoje te chama.
  </p>
</header>

<main class="container">

  <section>

    <p class="intro" style="text-align:center; max-width:520px; margin:0 auto 26px; color:rgba(255,255,255,0.65);">
      Você pode buscar por emoção, dor,
      ou simplesmente deixar que uma leitura te encontre.
    </p>

    <input
      id="search"
      type="text"
      placeholder="Buscar por emoção ou palavra…"
      aria-label="Buscar leituras emocionais"
    >

    <section
      id="libraryGrid"
      class="grid"
      aria-live="polite"
    ></section>

  </section>

</main>

<!-- ✅ Motor correcto -->
<script src="../../js/library-engine.js"></script>

</body>
</html>
